<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ID Card - Marcus Salarza</title>
    <style>
        .student-card {
            max-width: 360px;
            border: 1px solid #000;
            padding: 12px;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }
        .student-card h2 { color: #4a4a4a; }
        .student-card a { color: #0066cc; text-decoration: none; }
        .student-card a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="card" class="student-card">
        <h2 id="name">Marcus Salarza</h2>
        <div class="details">
            <p><strong>Course:</strong> Information Technology</p>
            <p><span class="id-label">Student ID:</span> <span class="id-value">200910051</span></p>
            <p>Bio: <span class="bio">A second-year student interested in web development and data science.</span></p>
            <p>Contact: <a href="m.salarzaa@gmail.com" id="email">m.salarzaa@gmail.com</a></p>
        </div>
    </div>
</body>
</html>
